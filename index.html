<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>藥師值班班表工具</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft JhengHei', sans-serif; background: #f0f2f5; color: #333; padding: 20px; }
h1 { text-align: center; margin-bottom: 10px; color: #2c3e50; }
.subtitle { text-align: center; color: #7f8c8d; margin-bottom: 20px; font-size: 14px; }

.toolbar { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
.toolbar button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; transition: 0.2s; }
.toolbar button:hover { opacity: 0.85; }
.btn-primary { background: #3498db; color: white; }
.btn-success { background: #27ae60; color: white; }
.btn-warning { background: #e67e22; color: white; }
.btn-danger { background: #e74c3c; color: white; }
.btn-secondary { background: #95a5a6; color: white; }

.settings-panel { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.settings-panel h3 { margin-bottom: 12px; color: #2c3e50; }
.settings-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 10px; }
.settings-item { display: flex; flex-direction: column; gap: 4px; }
.settings-item label { font-size: 13px; color: #555; }
.settings-item input, .settings-item select { padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }

.pharmacist-list { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.pharmacist-list h3 { margin-bottom: 12px; color: #2c3e50; }
.pharmacist-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.pharmacist-tag { background: #ecf0f1; border: 2px solid #bdc3c7; border-radius: 20px; padding: 4px 14px; font-size: 14px; cursor: pointer; transition: 0.2s; }
.pharmacist-tag.active { background: #3498db; color: white; border-color: #2980b9; }
.pharmacist-tag:hover { border-color: #3498db; }

.schedule-table-container { overflow-x: auto; background: white; border-radius: 10px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
table { border-collapse: collapse; width: 100%; min-width: 800px; }
th, td { border: 1px solid #ddd; padding: 8px 10px; text-align: center; font-size: 14px; }
th { background: #2c3e50; color: white; position: sticky; top: 0; z-index: 1; }
td { cursor: pointer; transition: background 0.15s; }
td:hover { background: #e8f4fd; }
td.weekend { background: #fef9e7; }
td.weekend:hover { background: #fdf2c7; }
td.conflict { background: #fadbd8 !important; border: 2px solid #e74c3c; }
td.empty { color: #bbb; font-style: italic; }

.shift-colors { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; justify-content: center; }
.shift-color-item { display: flex; align-items: center; gap: 6px; font-size: 13px; }
.shift-color-box { width: 18px; height: 18px; border-radius: 4px; border: 1px solid #999; }

.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal { background: white; border-radius: 10px; padding: 25px; min-width: 300px; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
.modal h3 { margin-bottom: 15px; color: #2c3e50; }
.modal select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; margin-bottom: 15px; }
.modal-buttons { display: flex; gap: 10px; justify-content: flex-end; }
.modal button { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
.modal .btn-cancel { background: #bdc3c7; color: white; }
.modal .btn-confirm { background: #3498db; color: white; }

.conflict-list { background: #fadbd8; border-radius: 8px; padding: 12px 16px; margin: 10px 0; font-size: 14px; display: none; }
.conflict-list.show { display: block; }
.conflict-list h4 { color: #c0392b; margin-bottom: 6px; }
.conflict-list ul { list-style: disc inside; color: #c0392b; }

.week-nav { display: flex; gap: 10px; align-items: center; justify-content: center; margin-bottom: 15px; }
.week-nav button { padding: 6px 14px; border: 1px solid #ddd; background: white; border-radius: 6px; cursor: pointer; font-size: 14px; }
.week-nav button:hover { background: #f0f0f0; }
.week-nav span { font-size: 16px; font-weight: bold; color: #2c3e50; min-width: 180px; text-align: center; }

.week-selector { display: flex; gap: 5px; justify-content: center; margin-bottom: 10px; flex-wrap: wrap; }
.week-tab { padding: 4px 10px; border: 2px solid #ddd; background: white; border-radius: 20px; cursor: pointer; font-size: 12px; transition: 0.2s; }
.week-tab.active { background: #3498db; color: white; border-color: #3498b9; }
.week-tab:hover:not(.active) { border-color: #3498db; }

.month-jumper { display: flex; gap: 5px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap; }
.month-tab { padding: 4px 12px; border: 2px solid #ddd; background: white; border-radius: 16px; cursor: pointer; font-size: 12px; transition: 0.2s; }
.month-tab:hover { border-color: #27ae60; }
.month-tab.current-month { background: #27ae60; color: white; border-color: #27ae60; }

.notes-area { width: 100%; min-height: 80px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; resize: vertical; margin-top: 10px; }

.copy-btn { background: #8e44ad; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
.copy-btn:hover { opacity: 0.85; }
#copyStatus { font-size: 13px; color: #27ae60; margin-left: 10px; display: none; }

.view-toggle { display: flex; gap: 5px; justify-content: center; margin-bottom: 15px; }
.view-toggle button { padding: 6px 16px; border: 2px solid #ddd; background: white; border-radius: 20px; cursor: pointer; font-size: 13px; transition: 0.2s; }
.view-toggle button.active { background: #2c3e50; color: white; border-color: #2c3e50; }
.view-toggle button:hover:not(.active) { border-color: #2c3e50; }

@media (max-width: 768px) {
  .toolbar { flex-direction: column; align-items: stretch; }
  .toolbar button { width: 100%; }
  th, td { padding: 6px; font-size: 12px; }
}
</style>
</head>
<body>

<h1>💊 藥師值班班表工具</h1>
<p class="subtitle">11 位藥師輪值排班系統（每週輪調）</p>
<p class="subtitle" style="font-size:13px;color:#3498db;">
輪調順序：機動 → 磨粉 → 夜2 → 泡製2 → 值2 → 病房 → 夜4 → 調1 → 夜3 → 發藥 → 夜1 → 回機動
</p>

<div class="view-toggle">
  <button id="viewByPharmacist" class="active" onclick="switchView('pharmacist')">👤 以藥師為主</button>
  <button id="viewByShift" onclick="switchView('shift')">🏥 以班別為主</button>
</div>

<div class="settings-panel">
  <h3>⚙️ 基本設定</h3>
  <div class="settings-row">
    <div class="settings-item">
      <label>開始日期</label>
      <input type="date" id="startDate" value="">
    </div>
    <div class="settings-item">
      <label>排班週數</label>
      <input type="number" id="weekCount" value="52" min="1" max="52">
      <div style="font-size:12px;margin-top:4px;">
        <button type="button" onclick="setWeeks(4)" style="padding:2px 8px;border:1px solid #ddd;border-radius:4px;cursor:pointer;background:white;">1月</button>
        <button type="button" onclick="setWeeks(13)" style="padding:2px 8px;border:1px solid #ddd;border-radius:4px;cursor:pointer;background:white;">3月</button>
        <button type="button" onclick="setWeeks(26)" style="padding:2px 8px;border:1px solid #ddd;border-radius:4px;cursor:pointer;background:white;">半年</button>
        <button type="button" onclick="setWeeks(52)" style="padding:2px 8px;border:1px solid #ddd;border-radius:4px;cursor:pointer;background:#3498db;color:white;">全年</button>
      </div>
    </div>
    <div class="settings-item">
      <label>起始藥師（第1號）</label>
      <input type="text" id="firstPharmacist" value="藥師A" placeholder="第一位輪值的藥師">
    </div>
    <div class="settings-item">
      <label>起始班別（第1週從哪個班開始）</label>
      <select id="startShiftSelect">
        <option value="0">機動</option>
        <option value="1">磨粉</option>
        <option value="2">夜2</option>
        <option value="3">泡製2</option>
        <option value="4">值2</option>
        <option value="5">病房</option>
        <option value="6">夜4</option>
        <option value="7">調1</option>
        <option value="8">夜3</option>
        <option value="9">發藥</option>
        <option value="10">夜1</option>
      </select>
    </div>
  </div>
  <div class="settings-row">
    <div class="settings-item">
      <label>班別順序（用逗號分隔）</label>
      <input type="text" id="shiftOrderInput" style="width:600px;" value="機動,磨粉,夜2,泡製2,值2,病房,夜4,調1,夜3,發藥,夜1">
    </div>
  </div>
  <div class="settings-row">
    <div class="settings-item">
      <label>特殊限制（每行一條）</label>
      <textarea id="constraintsInput" rows="5" style="width:600px;" placeholder="例如：&#10;藥師A 週三不能值班&#10;藥師C 不能連續夜班&#10;藥師F 週五固定機動"></textarea>
    </div>
  </div>
  <div style="margin-top:10px;">
    <button class="btn-primary" onclick="applySettings()">套用設定並重排</button>
    <button class="btn-secondary" onclick="saveSettings()">💾 儲存設定</button>
    <button class="btn-secondary" onclick="loadSettings()">📂 載入設定</button>
  </div>
</div>

<div class="pharmacist-list">
  <h3>👥 藥師名單（點擊可重新命名）</h3>
  <div id="pharmacistTags" class="pharmacist-tags"></div>
  <div style="margin-top:10px;">
    <button class="btn-secondary" onclick="renamePharmacist()">✏️ 重新命名藥師</button>
  </div>
</div>

<div class="toolbar">
  <button class="btn-success" onclick="autoGenerate()">⚡ 自動排班</button>
  <button class="btn-primary" onclick="clearSchedule()">🗑️ 清空班表</button>
  <button class="btn-warning" onclick="checkConflicts()">🔍 檢查衝突</button>
  <button class="btn-secondary" onclick="exportCSV()">📊 匯出 CSV</button>
  <button class="btn-secondary" onclick="exportJSON()">💾 匯出 JSON</button>
  <button class="btn-secondary" onclick="importJSON()">📂 匯入 JSON</button>
  <button class="copy-btn" onclick="copyToClipboard()">📋 複製班表文字</button>
  <span id="copyStatus">✅ 已複製</span>
</div>

<div class="week-nav">
  <button onclick="changeWeek(-1)">◀ 上一週</button>
  <span id="weekLabel"></span>
  <button onclick="changeWeek(1)">下一週 ▶</button>
</div>
<div class="week-selector" id="weekSelector"></div>
<div class="month-jumper" id="monthJumper"></div>

<div class="conflict-list" id="conflictList">
  <h4>⚠️ 衝突警告</h4>
  <ul id="conflictItems"></ul>
</div>

<div class="schedule-table-container">
  <table id="scheduleTable">
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="shift-colors" id="shiftColors"></div>

<div class="settings-panel">
  <h3>📝 備註</h3>
  <textarea class="notes-area" id="notesArea" placeholder="在這裡寫下備註..."></textarea>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3 id="modalTitle">修改班表</h3>
    <p id="modalInfo" style="margin-bottom:12px;color:#555;font-size:14px;"></p>
    <select id="modalSelect"></select>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-confirm" onclick="confirmEdit()">確認</button>
    </div>
  </div>
</div>

<script>
let pharmacists = ['藥師A','藥師B','藥師C','藥師D','藥師E','藥師F','藥師G','藥師H','藥師I','藥師J','藥師K'];
let shiftOrder = ['機動','磨粉','夜2','泡製2','值2','病房','夜4','調1','夜3','發藥','夜1'];
let constraints = [];
let schedule = {};
let weekCount = 52;
let startDateStr = '';
let currentWeek = 0;
let editingCell = null;
let currentView = 'pharmacist';

const shiftColors = {
  '機動':'#3498db','磨粉':'#e67e22','夜2':'#8e44ad','泡製2':'#1abc9c',
  '值2':'#2ecc71','病房':'#e74c3c','夜4':'#9b59b6','調1':'#f39c12',
  '夜3':'#7f3f98','發藥':'#16a085','夜1':'#6c3483'
};

function setWeeks(n) {
  document.getElementById('weekCount').value = n;
  applySettings();
}

function init() {
  const today = new Date();
  const day = today.getDay();
  const diff = day === 0 ? 1 : 8 - day;
  const monday = new Date(today);
  monday.setDate(today.getDate() + diff);
  startDateStr = formatDate(monday);
  document.getElementById('startDate').value = startDateStr;
  renderPharmacists();
  renderShiftColors();
  updateStartShiftOptions();
  applySettings();
}

function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
function parseDate(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function addDays(ds,n) { const d=parseDate(ds); d.setDate(d.getDate()+n); return formatDate(d); }

function switchView(view) {
  currentView = view;
  document.getElementById('viewByPharmacist').classList.toggle('active',view==='pharmacist');
  document.getElementById('viewByShift').classList.toggle('active',view==='shift');
  renderTable();
}

function renderPharmacists() {
  const c = document.getElementById('pharmacistTags'); c.innerHTML='';
  pharmacists.forEach((p,i) => {
    const t = document.createElement('div'); t.className='pharmacist-tag active';
    t.textContent=(i+1)+'. '+p; t.onclick=()=>t.classList.toggle('active'); c.appendChild(t);
  });
}

function renderShiftColors() {
  const c=document.getElementById('shiftColors'); c.innerHTML='';
  shiftOrder.forEach(s => {
    const it=document.createElement('div'); it.className='shift-color-item';
    const cl=shiftColors[s]||'#95a5a6';
    it.innerHTML='<div class="shift-color-box" style="background:'+cl+'"></div><span>'+s+'</span>';
    c.appendChild(it);
  });
}

function renderWeekSelector() {
  const c=document.getElementById('weekSelector'); c.innerHTML='';
  const sr=5, sw=Math.max(0,currentWeek-sr), ew=Math.min(weekCount-1,currentWeek+sr);
  for(let w=sw;w<=ew;w++){
    const t=document.createElement('div'); t.className='week-tab'+(w===currentWeek?' active':'');
    const ws=addDays(startDateStr,w*7), we=addDays(ws,6);
    t.textContent='第'+(w+1)+'週 ('+ws.slice(5)+'~'+we.slice(5)+')';
    t.onclick=()=>{currentWeek=w;renderWeekSelector();renderWeekLabel();renderTable();};
    c.appendChild(t);
  }
  renderMonthJumper();
}

function renderWeekLabel() {
  const l=document.getElementById('weekLabel');
  const ws=addDays(startDateStr,currentWeek*7), we=addDays(ws,6);
  l.textContent='第'+(currentWeek+1)+'週 / '+weekCount+'週 ('+ws+' ~ '+we+')';
}

function changeWeek(d) {
  const nw=currentWeek+d; if(nw<0||nw>=weekCount) return;
  currentWeek=nw; renderWeekSelector(); renderWeekLabel(); renderTable();
}

function renderMonthJumper() {
  const c=document.getElementById('monthJumper'); c.innerHTML='';
  const st=parseDate(startDateStr), end=new Date(st); end.setDate(end.getDate()+weekCount*7);
  const months=[]; const cur=new Date(st.getFullYear(),st.getMonth(),1);
  while(cur<=end){ months.push({y:cur.getFullYear(),m:cur.getMonth()}); cur.setMonth(cur.getMonth()+1); }
  const ws=parseDate(addDays(startDateStr,currentWeek*7));
  const cym=ws.getFullYear()+'-'+String(ws.getMonth()+1).padStart(2,'0');
  months.forEach(({y,m})=>{
    const t=document.createElement('div'); const ym=y+'-'+String(m+1).padStart(2,'0');
    t.className='month-tab'+(ym===cym?' current-month':'');
    t.textContent=y+'/'+(m+1);
    t.onclick=()=>{
      const td=new Date(y,m,1);
      const dd=Math.floor((td-parseDate(startDateStr))/(86400000));
      let tw=Math.floor(dd/7); if(tw<0)tw=0; if(tw>=weekCount)tw=weekCount-1;
      currentWeek=tw; renderWeekSelector(); renderWeekLabel(); renderTable();
    };
    c.appendChild(t);
  });
}

function getDayName(ds){const d=['週日','週一','週二','週三','週四','週五','週六'];return d[parseDate(ds).getDay()];}

function renderTable(){ if(currentView==='pharmacist') renderTableByPharmacist(); else renderTableByShift(); updateStats(); }

function renderTableByPharmacist() {
  const h=document.getElementById('tableHead'), b=document.getElementById('tableBody');
  let hh='<tr><th>藥師 \\ 日期</th>';
  const ws=addDays(startDateStr,currentWeek*7);
  for(let i=0;i<7;i++){const ds=addDays(ws,i);const wk=parseDate(ds).getDay()===0||parseDate(ds).getDay()===6;
    hh+='<th'+(wk?' style="background:#e67e22"':'')+'>'+ds.slice(5)+'<br><small>'+getDayName(ds)+'</small></th>';}
  h.innerHTML=hh+'</tr>';
  b.innerHTML='';
  pharmacists.forEach((p,pi)=>{
    let rh='<tr><td style="font-weight:bold;background:#ecf0f1;">'+(pi+1)+'. '+p+'</td>';
    for(let i=0;i<7;i++){
      const ds=addDays(ws,i),wk=parseDate(ds).getDay()===0||parseDate(ds).getDay()===6;
      let as=''; if(schedule[ds]){for(const s of shiftOrder){if(schedule[ds][s]===p){as=s;break;}}}
      const cl=as?(shiftColors[as]||'#95a5a6'):'';
      const cf=as&&checkCellConflict(ds,as,p);
      if(as) rh+='<td class="'+(wk?'weekend':'')+' '+(cf?'conflict':'')+'" style="background:'+cl+'33;font-weight:bold;" onclick="openEditModal(\''+ds+'\',\''+p+'\')">'+as+'</td>';
      else rh+='<td class="'+(wk?'weekend':'')+' empty" onclick="openEditModal(\''+ds+'\',\''+p+'\')">—</td>';
    }
    b.innerHTML+=rh+'</tr>';
  });
}

function renderTableByShift() {
  const h=document.getElementById('tableHead'), b=document.getElementById('tableBody');
  let hh='<tr><th>班別 \\ 日期</th>';
  const ws=addDays(startDateStr,currentWeek*7);
  for(let i=0;i<7;i++){const ds=addDays(ws,i);const wk=parseDate(ds).getDay()===0||parseDate(ds).getDay()===6;
    hh+='<th'+(wk?' style="background:#e67e22"':'')+'>'+ds.slice(5)+'<br><small>'+getDayName(ds)+'</small></th>';}
  h.innerHTML=hh+'</tr>';
  b.innerHTML='';
  shiftOrder.forEach(shift=>{
    let rh='<tr><td style="font-weight:bold;background:#ecf0f1;"><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:'+(shiftColors[shift]||'#95a5a6')+';margin-right:6px;"></span>'+shift+'</td>';
    for(let i=0;i<7;i++){
      const ds=addDays(ws,i),wk=parseDate(ds).getDay()===0||parseDate(ds).getDay()===6;
      const a=schedule[ds]&&schedule[ds][shift]?schedule[ds][shift]:'';
      const cf=a&&checkCellConflict(ds,shift,a);
      rh+='<td class="'+(wk?'weekend':'')+' '+(a?'':'empty')+' '+(cf?'conflict':'')+'" onclick="openEditModalShift(\''+ds+'\',\''+shift+'\')">'+(a||'—')+'</td>';
    }
    b.innerHTML+=rh+'</tr>';
  });
}

function autoGenerate() {
  parseSettingsFromInputs(); schedule={};
  const at=document.querySelectorAll('.pharmacist-tag.active'); let ap=[];
  at.forEach(t=>{const tx=t.textContent.replace(/^\d+\.\s*/,'');ap.push(tx);});
  if(ap.length<shiftOrder.length){alert('啟用藥師數('+ap.length+')少於班別數('+shiftOrder.length+')，無法排班！');return;}
  let si=0; const fp=document.getElementById('firstPharmacist').value.trim();
  if(fp){si=ap.indexOf(fp);if(si<0)si=0;}
  const ssi=parseInt(document.getElementById('startShiftSelect').value)||0;
  for(let w=0;w<weekCount;w++){
    for(let d=0;d<7;d++){
      const ds=addDays(startDateStr,w*7+d); schedule[ds]={};
      shiftOrder.forEach((shift,sIdx)=>{
        let pi=(si-w+sIdx-ssi+ap.length*100)%ap.length;
        let cand=ap[pi]; let att=0;
        while(att<ap.length&&violatesConstraint(ds,shift,cand,schedule[ds])){pi=(pi+1)%ap.length;cand=ap[pi];att++;}
        schedule[ds][shift]=cand;
      });
    }
  }
  currentWeek=0; renderWeekSelector(); renderWeekLabel(); renderTable(); checkConflicts();
}

function violatesConstraint(ds,shift,ph,dayS) {
  for(const c of constraints){
    if(c.type==='no_day'&&c.pharmacist===ph&&c.day===getDayName(ds)) return true;
    if(c.type==='no_shift'&&c.pharmacist===ph&&c.shift===shift) return true;
    if(c.type==='no_date'&&c.pharmacist===ph&&c.date===ds) return true;
    if(c.type==='no_consecutive_night'&&shift.includes('夜')){
      const y=addDays(ds,-1); if(schedule[y]){for(const s of shiftOrder){if(s.includes('夜')&&schedule[y][s]===ph) return true;}}
    }
  }
  for(const s of shiftOrder){if(s!==shift&&dayS[s]===ph) return true;}
  return false;
}

function checkCellConflict(ds,shift,ph) {
  if(!ph) return false; const dS=schedule[ds]; if(!dS) return false;
  for(const s of shiftOrder){if(s!==shift&&dS[s]===ph) return true;}
  for(const c of constraints){
    if(c.pharmacist!==ph) continue;
    if(c.type==='no_day'&&c.day===getDayName(ds)) return true;
    if(c.type==='no_shift'&&c.shift===shift) return true;
    if(c.type==='no_date'&&c.date===ds) return true;
    if(c.type==='no_consecutive_night'&&shift.includes('夜')){
      const y=addDays(ds,-1); if(schedule[y]){for(const s of shiftOrder){if(s.includes('夜')&&schedule[y][s]===ph) return true;}}
    }
  }
  return false;
}

function checkConflicts() {
  const cf=[],cl=document.getElementById('conflictList'),ci=document.getElementById('conflictItems');
  Object.keys(schedule).forEach(ds=>{if(!schedule[ds])return;shiftOrder.forEach(sh=>{const p=schedule[ds][sh];if(p&&checkCellConflict(ds,sh,p))cf.push(ds+' '+getDayName(ds)+' '+sh+': '+p);});});
  if(cf.length>0){ci.innerHTML=cf.map(c=>'<li>'+c+'</li>').join('');cl.classList.add('show');}
  else{ci.innerHTML='';cl.classList.remove('show');}
  renderTable(); return cf.length;
}

function openEditModal(ds,ph) {
  editingCell={ds,ph,mode:'pharmacist'};
  const m=document.getElementById('editModal'),t=document.getElementById('modalTitle'),i=document.getElementById('modalInfo'),sel=document.getElementById('modalSelect');
  let cs=''; if(schedule[ds]){for(const s of shiftOrder){if(schedule[ds][s]===ph){cs=s;break;}}}
  t.textContent='修改 '+getDayName(ds)+' '+ds+' 「'+ph+'」的班別';
  i.textContent='目前：'+(cs||'空');
  sel.innerHTML='<option value="">— 空班 —</option>'+shiftOrder.map(s=>'<option value="'+s+'" '+(s===cs?'selected':'')+'>'+s+'</option>').join('');
  m.classList.add('show');
}

function openEditModalShift(ds,shift) {
  editingCell={ds,shift,mode:'shift'};
  const m=document.getElementById('editModal'),t=document.getElementById('modalTitle'),i=document.getElementById('modalInfo'),sel=document.getElementById('modalSelect');
  const cur=schedule[ds]&&schedule[ds][shift]?schedule[ds][shift]:'';
  t.textContent='修改 '+getDayName(ds)+' '+ds+' 的「'+shift+'」';
  i.textContent='目前：'+(cur||'空');
  sel.innerHTML='<option value="">— 空班 —</option>'+pharmacists.map(p=>'<option value="'+p+'" '+(p===cur?'selected':'')+'>'+p+'</option>').join('');
  m.classList.add('show');
}

function closeModal(){document.getElementById('editModal').classList.remove('show');editingCell=null;}

function confirmEdit() {
  if(!editingCell) return; const sel=document.getElementById('modalSelect'),v=sel.value;
  if(editingCell.mode==='pharmacist'){
    const {ds,ph}=editingCell; if(!schedule[ds])schedule[ds]={};
    for(const s of shiftOrder){if(schedule[ds][s]===ph)schedule[ds][s]='';}
    if(v)schedule[ds][v]=ph;
  } else {
    const {ds,shift}=editingCell; if(!schedule[ds])schedule[ds]={}; schedule[ds][shift]=v;
  }
  closeModal(); renderTable(); checkConflicts();
}

function parseSettingsFromInputs() {
  const o=document.getElementById('shiftOrderInput').value.trim();
  if(o) shiftOrder=o.split(',').map(s=>s.trim()).filter(s=>s);
  constraints=parseConstraints(document.getElementById('constraintsInput').value.trim());
  weekCount=parseInt(document.getElementById('weekCount').value)||4;
  startDateStr=document.getElementById('startDate').value||startDateStr;
  updateStartShiftOptions();
}

function updateStartShiftOptions() {
  const sel=document.getElementById('startShiftSelect'),cv=sel.value;
  sel.innerHTML=shiftOrder.map((s,i)=>'<option value="'+i+'">'+s+'</option>').join('');
  if(cv&&cv<shiftOrder.length)sel.value=cv;
}

function parseConstraints(text) {
  if(!text) return []; const lines=text.split('\n').map(l=>l.trim()).filter(l=>l); const r=[];
  for(const line of lines){
    const parts=line.split(/\s+/); if(parts.length<2) continue;
    const ph=parts[0],rest=parts.slice(1).join(' ');
    let m=rest.match(/週([日一二三四五六])不能(?:值班|排班)/);
    if(m){const dm={'日':'週日','一':'週一','二':'週二','三':'週三','四':'週四','五':'週五','六':'週六'};r.push({type:'no_day',pharmacist:ph,day:dm[m[1]],text:line});continue;}
    m=rest.match(/不能(?:排|值)(.+)/); if(m){const sn=m[1].trim();if(shiftOrder.includes(sn)){r.push({type:'no_shift',pharmacist:ph,shift:sn,text:line});continue;}}
    m=rest.match(/(\d{4}-\d{2}-\d{2})不能/); if(m){r.push({type:'no_date',pharmacist:ph,date:m[1],text:line});continue;}
    if(rest.includes('不能連續夜班')||rest.includes('不連夜')){r.push({type:'no_consecutive_night',pharmacist:ph,text:line});continue;}
    m=rest.match(/(?:固定|永遠)(.+)/); if(m){const sn=m[1].trim();if(shiftOrder.includes(sn)){r.push({type:'must_shift',pharmacist:ph,shift:sn,text:line});continue;}}
    r.push({type:'generic',pharmacist:ph,text:line});
  }
  return r;
}

function applySettings(){parseSettingsFromInputs();renderPharmacists();renderShiftColors();renderWeekSelector();renderWeekLabel();autoGenerate();}

function saveSettings(){
  const d={pharmacists,shiftOrder,constraints:document.getElementById('constraintsInput').value,
    startDate:document.getElementById('startDate').value,weekCount:document.getElementById('weekCount').value,
    firstPharmacist:document.getElementById('firstPharmacist').value,
    startShift:document.getElementById('startShiftSelect').value,schedule,notes:document.getElementById('notesArea').value};
  localStorage.setItem('pharmacistSchedule',JSON.stringify(d));alert('✅ 設定已儲存到瀏覽器');
}

function loadSettings(){
  const s=localStorage.getItem('pharmacistSchedule');if(!s){alert('⚠️ 找不到已儲存的設定');return;}
  const d=JSON.parse(s);pharmacists=d.pharmacists||pharmacists;shiftOrder=d.shiftOrder||shiftOrder;schedule=d.schedule||{};
  document.getElementById('constraintsInput').value=d.constraints||'';
  document.getElementById('startDate').value=d.startDate||startDateStr;
  document.getElementById('weekCount').value=d.weekCount||4;
  document.getElementById('firstPharmacist').value=d.firstPharmacist||'藥師A';
  if(d.startShift!==undefined)document.getElementById('startShiftSelect').value=d.startShift;
  document.getElementById('shiftOrderInput').value=shiftOrder.join(',');
  document.getElementById('notesArea').value=d.notes||'';
  startDateStr=d.startDate||startDateStr;weekCount=parseInt(d.weekCount)||4;
  constraints=parseConstraints(d.constraints||'');
  renderPharmacists();renderShiftColors();renderWeekSelector();renderWeekLabel();renderTable();alert('✅ 設定已載入');
}

function clearSchedule(){if(!confirm('確定要清空整個班表嗎？'))return;schedule={};renderTable();document.getElementById('conflictList').classList.remove('show');}

function renamePharmacist(){
  const idx=prompt('要重新命名第幾位藥師？（1-'+pharmacists.length+'）');if(!idx)return;
  const i=parseInt(idx)-1;if(i<0||i>=pharmacists.length){alert('編號錯誤');return;}
  const nn=prompt('目前名稱：'+pharmacists[i]+'\n請輸入新名稱：');if(!nn)return;
  Object.keys(schedule).forEach(ds=>{if(!schedule[ds])return;Object.keys(schedule[ds]).forEach(sh=>{if(schedule[ds][sh]===pharmacists[i])schedule[ds][sh]=nn;});});
  pharmacists[i]=nn;document.getElementById('firstPharmacist').value=pharmacists[0];renderPharmacists();renderTable();
}

function updateStats(){const counts={};pharmacists.forEach(p=>counts[p]=0);Object.keys(schedule).forEach(ds=>{if(!schedule[ds])return;Object.values(schedule[ds]).forEach(p=>{if(p&&counts[p]!==undefined)counts[p]++;});});}

function exportCSV(){
  const ws=addDays(startDateStr,currentWeek*7);
  let csv=currentView==='pharmacist'?'藥師':'班別';
  for(let i=0;i<7;i++){const ds=addDays(ws,i);csv+=','+ds+' '+getDayName(ds);}
  csv+='\n';
  if(currentView==='pharmacist'){
    pharmacists.forEach((p,pi)=>{csv+=(pi+1)+'.'+p;for(let i=0;i<7;i++){const ds=addDays(ws,i);let sh='';if(schedule[ds]){for(const s of shiftOrder){if(schedule[ds][s]===p){sh=s;break;}}}csv+=','+(sh||'');}csv+='\n';});
  } else {
    shiftOrder.forEach(sh=>{csv+=sh;for(let i=0;i<7;i++){const ds=addDays(ws,i);csv+=','+(schedule[ds]&&schedule[ds][sh]?schedule[ds][sh]:'');}csv+='\n';});
  }
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='藥師班表_第'+(currentWeek+1)+'週.csv';a.click();URL.revokeObjectURL(url);
}

function exportJSON(){
  const d={pharmacists,shiftOrder,constraints:document.getElementById('constraintsInput').value,
    startDate:startDateStr,weekCount,schedule,firstPharmacist:document.getElementById('firstPharmacist').value,
    startShift:document.getElementById('startShiftSelect').value,notes:document.getElementById('notesArea').value,
    exportDate:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='藥師班表_'+startDateStr+'.json';a.click();URL.revokeObjectURL(url);
}

function importJSON(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=(ev)=>{const d=JSON.parse(ev.target.result);pharmacists=d.pharmacists||pharmacists;shiftOrder=d.shiftOrder||shiftOrder;
      schedule=d.schedule||{};startDateStr=d.startDate||startDateStr;weekCount=d.weekCount||4;
      document.getElementById('startDate').value=startDateStr;document.getElementById('weekCount').value=weekCount;
      document.getElementById('shiftOrderInput').value=shiftOrder.join(',');
      document.getElementById('constraintsInput').value=d.constraints||'';
      document.getElementById('firstPharmacist').value=d.firstPharmacist||pharmacists[0];
      if(d.startShift!==undefined)document.getElementById('startShiftSelect').value=d.startShift;
      document.getElementById('notesArea').value=d.notes||'';constraints=parseConstraints(d.constraints||'');
      updateStartShiftOptions();renderPharmacists();renderShiftColors();renderWeekSelector();renderWeekLabel();renderTable();alert('✅ 匯入成功');};
    r.readAsText(f);};inp.click();
}

function copyToClipboard(){
  let text='💊 藥師值班班表\n';
  for(let w=0;w<weekCount;w++){
    const ws=addDays(startDateStr,w*7);text+='\n=== 第'+(w+1)+'週 ('+ws+' ~ '+addDays(ws,6)+') ===\n';
    if(currentView==='pharmacist'){
      text+='藥師'.padEnd(8);for(let i=0;i<7;i++){text+='\t'+getDayName(addDays(ws,i));}text+='\n';
      pharmacists.forEach((p,pi)=>{text+=(pi+1)+'.'+p;text.padEnd(8);for(let i=0;i<7;i++){const ds=addDays(ws,i);let sh='';if(schedule[ds]){for(const s of shiftOrder){if(schedule[ds][s]===p){sh=s;break;}}}text+='\t'+(sh||'—');}text+='\n';});
    } else {
      text+='班別'.padEnd(8);for(let i=0;i<7;i++){text+='\t'+getDayName(addDays(ws,i));}text+='\n';
      shiftOrder.forEach(sh=>{text+=sh.padEnd(8);for(let i=0;i<7;i++){text+='\t'+(schedule[addDays(ws,i)]&&schedule[addDays(ws,i)][sh]?schedule[addDays(ws,i)][sh]:'—');}text+='\n';});
    }
  }
  navigator.clipboard.writeText(text).then(()=>{const s=document.getElementById('copyStatus');s.style.display='inline';setTimeout(()=>s.style.display='none',2000);});
}

init();
</script>
