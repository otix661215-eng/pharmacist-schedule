<script>
// ======== иіҮж?зөҗж? ========
let pharmacists = ['?Ҙеё«A','?Ҙеё«B','?Ҙеё«C','?Ҙеё«D','?Ҙеё«E','?Ҙеё«F','?Ҙеё«G','?Ҙеё«H','?Ҙеё«I','?Ҙеё«J','?Ҙеё«K'];
let shiftOrder = ['ж©ҹе?','зЈЁз?','еӨ?','жіЎиЈҪ2','??','?…жҲҝ','еӨ?','иӘ?','еӨ?','?ји—Ҙ','еӨ?'];
let constraints = [];
let schedule = {}; // { 'YYYY-MM-DD': { 'ж©ҹе?': '?Ҙеё«A', 'зЈЁз?': '?Ҙеё«B', ... } }
let weekCount = 4;
let startDateStr = '';
let currentWeek = 0;
let editingCell = null;
let currentView = 'pharmacist'; // 'pharmacist' or 'shift'

// ?ӯеҲҘйЎҸиүІ
const shiftColors = {
  'ж©ҹе?': '#3498db', 'зЈЁз?': '#e67e22', 'еӨ?': '#8e44ad', 'жіЎиЈҪ2': '#1abc9c',
  '??': '#2ecc71', '?…жҲҝ': '#e74c3c', 'еӨ?': '#9b59b6', 'иӘ?': '#f39c12',
  'еӨ?': '#7f3f98', '?ји—Ҙ': '#16a085', 'еӨ?': '#6c3483'
};

// ======== ?қе???========
function init() {
  const today = new Date();
  const day = today.getDay();
  const diff = day === 0 ? 1 : 8 - day;
  const monday = new Date(today);
  monday.setDate(today.getDate() + diff);
  startDateStr = formatDate(monday);
  document.getElementById('startDate').value = startDateStr;
  
  renderPharmacists();
  renderShiftColors();
  updateStartShiftOptions();
  applySettings();
}

function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function parseDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function addDays(dateStr, n) {
  const d = parseDate(dateStr);
  d.setDate(d.getDate() + n);
  return formatDate(d);
}

// ======== иҰ–и??Үж? ========
function switchView(view) {
  currentView = view;
  document.getElementById('viewByPharmacist').classList.toggle('active', view === 'pharmacist');
  document.getElementById('viewByShift').classList.toggle('active', view === 'shift');
  renderTable();
}

// ======== жёІж? ========
function renderPharmacists() {
  const container = document.getElementById('pharmacistTags');
  container.innerHTML = '';
  pharmacists.forEach((p, i) => {
    const tag = document.createElement('div');
    tag.className = 'pharmacist-tag active';
    tag.textContent = `${i + 1}. ${p}`;
    tag.onclick = () => { tag.classList.toggle('active'); };
    container.appendChild(tag);
  });
}

function renderShiftColors() {
  const container = document.getElementById('shiftColors');
  container.innerHTML = '';
  shiftOrder.forEach(shift => {
    const item = document.createElement('div');
    item.className = 'shift-color-item';
    const color = shiftColors[shift] || '#95a5a6';
    item.innerHTML = `<div class="shift-color-box" style="background:${color}"></div><span>${shift}</span>`;
    container.appendChild(item);
  });
}

function renderWeekSelector() {
  const container = document.getElementById('weekSelector');
  container.innerHTML = '';
  // ?ӘйЎҜзӨәз•¶?ҚйҖұе?еҫ??ұз??үй?пјҢйҒҝ?ҚеӨӘеӨҡж???  const showRange = 5;
  const startW = Math.max(0, currentWeek - showRange);
  const endW = Math.min(weekCount - 1, currentWeek + showRange);
  for (let w = startW; w <= endW; w++) {
    const tab = document.createElement('div');
    tab.className = 'week-tab' + (w === currentWeek ? ' active' : '');
    const wkStart = addDays(startDateStr, w * 7);
    const wkEnd = addDays(wkStart, 6);
    tab.textContent = `з¬?{w + 1}??(${wkStart.slice(5)}~${wkEnd.slice(5)})`;
    tab.onclick = () => { currentWeek = w; renderWeekSelector(); renderWeekLabel(); renderTable(); };
    container.appendChild(tab);
  }
  renderMonthJumper();
}

function renderWeekLabel() {
  const label = document.getElementById('weekLabel');
  const wkStart = addDays(startDateStr, currentWeek * 7);
  const wkEnd = addDays(wkStart, 6);
  label.textContent = `з¬?{currentWeek + 1}??/ ${weekCount}??(${wkStart} ~ ${wkEnd})`;
}

function changeWeek(delta) {
  const newWeek = currentWeek + delta;
  if (newWeek < 0 || newWeek >= weekCount) return;
  currentWeek = newWeek;
  renderWeekSelector();
  renderWeekLabel();
  renderTable();
}

function renderMonthJumper() {
  const container = document.getElementById('monthJumper');
  container.innerHTML = '';
  // ?№ж? startDate ??weekCount иЁҲз?ж¶өи??„ж?д»?  const start = parseDate(startDateStr);
  const end = new Date(start);
  end.setDate(end.getDate() + weekCount * 7);
  const months = [];
  const cur = new Date(start.getFullYear(), start.getMonth(), 1);
  while (cur <= end) {
    months.push({ y: cur.getFullYear(), m: cur.getMonth() });
    cur.setMonth(cur.getMonth() + 1);
  }
  // ?¶е?йЎҜзӨә?ұз??Ҳд»Ҫ
  const wkStart = parseDate(addDays(startDateStr, currentWeek * 7));
  const currentYM = `${wkStart.getFullYear()}-${String(wkStart.getMonth()+1).padStart(2,'0')}`;
  
  months.forEach(({y, m}) => {
    const tab = document.createElement('div');
    const ym = `${y}-${String(m+1).padStart(2,'0')}`;
    tab.className = 'month-tab' + (ym === currentYM ? ' current-month' : '');
    tab.textContent = `${y}/${m+1}`;
    tab.onclick = () => {
      // и·іеҲ°?…еҗ«жӯӨж?д»Ҫз¬¬1еӨ©з???      const targetDate = new Date(y, m, 1);
      // ?ҫеҲ°?Җ?Ҙи??„йҖ?      const dayDiff = Math.floor((targetDate - parseDate(startDateStr)) / (1000*60*60*24));
      let targetWeek = Math.floor(dayDiff / 7);
      if (targetWeek < 0) targetWeek = 0;
      if (targetWeek >= weekCount) targetWeek = weekCount - 1;
      currentWeek = targetWeek;
      renderWeekSelector();
      renderWeekLabel();
      renderTable();
    };
    container.appendChild(tab);
  });
}

function getDayName(dateStr) {
  const days = ['?ұж—Ҙ','?ұд?','?ұд?','?ұд?','?ұе?','?ұд?','?ұе…ӯ'];
  return days[parseDate(dateStr).getDay()];
}

function renderTable() {
  if (currentView === 'pharmacist') {
    renderTableByPharmacist();
  } else {
    renderTableByShift();
  }
  updateStats();
}

// д»Ҙи—Ҙеё«зӮәдё»й?пјҡи?=?Ҙеё«пјҢе?=?Ҙж?пјҢж јеӯ??ӯеҲҘ
function renderTableByPharmacist() {
  const head = document.getElementById('tableHead');
  const body = document.getElementById('tableBody');
  
  let headHTML = '<tr><th>?Ҙеё« пј??Ҙж?</th>';
  const wkStart = addDays(startDateStr, currentWeek * 7);
  for (let i = 0; i < 7; i++) {
    const ds = addDays(wkStart, i);
    const isWeekend = parseDate(ds).getDay() === 0 || parseDate(ds).getDay() === 6;
    headHTML += `<th${isWeekend ? ' style="background:#e67e22"' : ''}>${ds.slice(5)}<br><small>${getDayName(ds)}</small></th>`;
  }
  headHTML += '</tr>';
  head.innerHTML = headHTML;
  
  body.innerHTML = '';
  pharmacists.forEach((p, pIdx) => {
    let rowHTML = `<tr><td style="font-weight:bold;background:#ecf0f1;">${pIdx + 1}. ${p}</td>`;
    for (let i = 0; i < 7; i++) {
      const ds = addDays(wkStart, i);
      const isWeekend = parseDate(ds).getDay() === 0 || parseDate(ds).getDay() === 6;
      let assignedShift = '';
      if (schedule[ds]) {
        for (const s of shiftOrder) {
          if (schedule[ds][s] === p) { assignedShift = s; break; }
        }
      }
      const color = assignedShift ? (shiftColors[assignedShift] || '#95a5a6') : '';
      const hasConflict = assignedShift && checkCellConflict(ds, assignedShift, p);
      if (assignedShift) {
        rowHTML += `<td class="${isWeekend?'weekend':''} ${hasConflict?'conflict':''}" style="background:${color}33;font-weight:bold;" onclick="openEditModal('${ds}','${p}')" data-date="${ds}" data-pharmacist="${p}">${assignedShift}</td>`;
      } else {

// ======== ?Әе??’зҸӯ ========
function autoGenerate() {
  parseSettingsFromInputs();
  schedule = {};
  
  const activeTags = document.querySelectorAll('.pharmacist-tag.active');
  let activePharmacists = [];
  activeTags.forEach((tag) => {
    const text = tag.textContent.replace(/^\d+\.\s*/, '');
    activePharmacists.push(text);
  });
  
  if (activePharmacists.length < shiftOrder.length) {
    alert(`? п? ?ҹз”Ё?Ҙеё«??(${activePharmacists.length}) е°‘ж–ј?ӯеҲҘ??(${shiftOrder.length})пјҢз„Ўжі•ж??ӯп?\nи«ӢиҮіе°‘е???${shiftOrder.length} дҪҚи—Ҙеё«гҖӮ`);
    return;
  }
  
  let startIdx = 0;
  const firstP = document.getElementById('firstPharmacist').value.trim();
  if (firstP) {
    startIdx = activePharmacists.indexOf(firstP);
    if (startIdx < 0) startIdx = 0;
  }
  
  // жҜҸйҖұијӘиӘҝп??Ҙеё«A?¬йҖұж??җзҸӯпјҢд??ұж??Ҷе??„д?дёҖ?ӢзҸӯ
  // ?ӯеҲҘ index ?ЁйҖұж•ё +1пјҢж?д»Ҙи—Ҙеё?index ?ЁйҖұж•ё -1
  const startShiftIdx = parseInt(document.getElementById('startShiftSelect').value) || 0;
  for (let w = 0; w < weekCount; w++) {
    for (let d = 0; d < 7; d++) {
      const ds = addDays(startDateStr, w * 7 + d);
      schedule[ds] = {};
      
      shiftOrder.forEach((shift, sIdx) => {
        let pIdx = (startIdx - w + sIdx - startShiftIdx + activePharmacists.length * 100) % activePharmacists.length;
        let candidate = activePharmacists[pIdx];
        
        let attempts = 0;
        while (attempts < activePharmacists.length && violatesConstraint(ds, shift, candidate, schedule[ds])) {
          pIdx = (pIdx + 1) % activePharmacists.length;
          candidate = activePharmacists[pIdx];
          attempts++;
        }
        
        schedule[ds][shift] = candidate;
      });
    }
  }
  
  currentWeek = 0;
  renderWeekSelector();
  renderWeekLabel();
  renderTable();
  checkConflicts();
}

function violatesConstraint(dateStr, shift, pharmacist, daySchedule) {
  for (const c of constraints) {
    if (c.type === 'no_day' && c.pharmacist === pharmacist) {
      const dayName = getDayName(dateStr);
      if (c.day === dayName) return true;
    }
    if (c.type === 'no_shift' && c.pharmacist === pharmacist && c.shift === shift) return true;
    if (c.type === 'no_date' && c.pharmacist === pharmacist && c.date === dateStr) return true;
    if (c.type === 'no_consecutive_night' && shift.includes('еӨ?)) {
      const yesterday = addDays(dateStr, -1);
      if (schedule[yesterday]) {
        for (const s of shiftOrder) {
          if (s.includes('еӨ?) && schedule[yesterday][s] === pharmacist) return true;
        }
      }
    }
  }
  // ?Ңдәә?ҢеӨ©дёҚиғҪ?©зҸӯ
  for (const s of shiftOrder) {
    if (s !== shift && daySchedule[s] === pharmacist) return true;
  }
  return false;
}

// ======== иЎқз?жӘўжҹҘ ========
function checkCellConflict(dateStr, shift, pharmacist) {
  if (!pharmacist) return false;
  const daySchedule = schedule[dateStr];
  if (!daySchedule) return false;
  
  for (const s of shiftOrder) {
    if (s !== shift && daySchedule[s] === pharmacist) return true;
  }
  
  for (const c of constraints) {
    if (c.pharmacist !== pharmacist) continue;
    if (c.type === 'no_day' && c.day === getDayName(dateStr)) return true;
    if (c.type === 'no_shift' && c.shift === shift) return true;
    if (c.type === 'no_date' && c.date === dateStr) return true;
    if (c.type === 'no_consecutive_night' && shift.includes('еӨ?)) {
      const yesterday = addDays(dateStr, -1);
      if (schedule[yesterday]) {
        for (const s of shiftOrder) {
          if (s.includes('еӨ?) && schedule[yesterday][s] === pharmacist) return true;
        }
      }
    }
  }
  return false;
}

function checkConflicts() {
  const conflicts = [];
  const conflictList = document.getElementById('conflictList');
  const conflictItems = document.getElementById('conflictItems');
  
  Object.keys(schedule).forEach(ds => {
    if (!schedule[ds]) return;
    shiftOrder.forEach(shift => {
      const p = schedule[ds][shift];
      if (p && checkCellConflict(ds, shift, p)) {
        conflicts.push(`${ds} ${getDayName(ds)} ${shift}: ${p}`);
      }
    });
  });
  
  if (conflicts.length > 0) {
    conflictItems.innerHTML = conflicts.map(c => `<li>${c}</li>`).join('');
    conflictList.classList.add('show');
  } else {
    conflictItems.innerHTML = '';
    conflictList.classList.remove('show');
  }
  renderTable();
  return conflicts.length;
}

// ======== иЁӯе? ========
function parseSettingsFromInputs() {
  const orderStr = document.getElementById('shiftOrderInput').value.trim();
  if (orderStr) {
    shiftOrder = orderStr.split(',').map(s => s.trim()).filter(s => s);
  }
  const constraintsText = document.getElementById('constraintsInput').value.trim();
  constraints = parseConstraints(constraintsText);
  weekCount = parseInt(document.getElementById('weekCount').value) || 4;
  startDateStr = document.getElementById('startDate').value || startDateStr;
  updateStartShiftOptions();
}

function updateStartShiftOptions() {
  const select = document.getElementById('startShiftSelect');
  const currentVal = select.value;
  select.innerHTML = shiftOrder.map((s, i) => `<option value="${i}">${s}</option>`).join('');
  if (currentVal && currentVal < shiftOrder.length) select.value = currentVal;
}

function parseConstraints(text) {
  if (!text) return [];
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  const result = [];
  
  for (const line of lines) {
    const parts = line.split(/\s+/);
    if (parts.length < 2) continue;
    const pharmacist = parts[0];
    const rest = parts.slice(1).join(' ');
    
    let m = rest.match(/??[?Ҙд?дәҢд??ӣд??ӯ])дёҚиғҪ(?:?јзҸӯ|?’зҸӯ)/);
    if (m) {
      const dayMap = {'??:'?ұж—Ҙ','дёҖ':'?ұд?','дә?:'?ұд?','дё?:'?ұд?','??:'?ұе?','дә?:'?ұд?','??:'?ұе…ӯ'};
      result.push({type:'no_day', pharmacist, day: dayMap[m[1]], text: line});
      continue;
    }
    m = rest.match(/дёҚиғҪ(?:?’|??(.+)/);
    if (m) {
      const shiftName = m[1].trim();
      if (shiftOrder.includes(shiftName)) {
        result.push({type:'no_shift', pharmacist, shift: shiftName, text: line});
        continue;
      }
    }
    m = rest.match(/(\d{4}-\d{2}-\d{2})дёҚиғҪ/);
    if (m) {
      result.push({type:'no_date', pharmacist, date: m[1], text: line});
      continue;
    }
    if (rest.includes('дёҚиғҪ???еӨңзҸӯ') || rest.includes('дёҚйҖ??')) {
      result.push({type:'no_consecutive_night', pharmacist, text: line});
      continue;
    }
    m = rest.match(/(?:?әе?|ж°ёй?)(.+)/);
    if (m) {
      const shiftName = m[1].trim();
      if (shiftOrder.includes(shiftName)) {
        result.push({type:'must_shift', pharmacist, shift: shiftName, text: line});
        continue;
      }
    }
    result.push({type:'generic', pharmacist, text: line});
  }
  return result;
}

function renamePharmacist() {
  const index = prompt('иҰҒй??°е‘Ҫ?Қз¬¬е№ҫд??Ҙеё«пјҹп?1-' + pharmacists.length + 'пј?);
  if (!index) return;
  const i = parseInt(index) - 1;
  if (i < 0 || i >= pharmacists.length) { alert('з·Ёи??ҜиӘӨ'); return; }
  const newName = prompt(`?®е??ҚзЁұпј?{pharmacists[i]}\nи«Ӣијё?Ҙж–°?ҚзЁұпјҡ`);
  if (!newName) return;
  Object.keys(schedule).forEach(ds => {
    if (!schedule[ds]) return;
    Object.keys(schedule[ds]).forEach(shift => {
      if (schedule[ds][shift] === pharmacists[i]) schedule[ds][shift] = newName;
    });
  });
  pharmacists[i] = newName;
  document.getElementById('firstPharmacist').value = pharmacists[0];
  renderPharmacists();
  renderTable();
}

function exportCSV() {
  const wkStart = addDays(startDateStr, currentWeek * 7);
  let csv = currentView === 'pharmacist' ? '?Ҙеё«' : '?ӯеҲҘ';
  for (let i = 0; i < 7; i++) {
    const ds = addDays(wkStart, i);
    csv += `,${ds} ${getDayName(ds)}`;
  }
  csv += '\n';
  
  if (currentView === 'pharmacist') {
    pharmacists.forEach((p, pIdx) => {
      csv += `${pIdx+1}.${p}`;
      for (let i = 0; i < 7; i++) {
        const ds = addDays(wkStart, i);
        let shift = '';
        if (schedule[ds]) { for (const s of shiftOrder) { if (schedule[ds][s] === p) { shift = s; break; } } }
        csv += ',' + (shift || '');
      }
      csv += '\n';
    });
  } else {
    shiftOrder.forEach(shift => {
      csv += shift;
      for (let i = 0; i < 7; i++) {
        const ds = addDays(wkStart, i);
        csv += ',' + (schedule[ds] && schedule[ds][shift] ? schedule[ds][shift] : '');
      }
      csv += '\n';
    });
  }
  
  const blob = new Blob(['\ufeff' + csv], {type: 'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `?Ҙеё«?ӯиЎЁ_з¬?{currentWeek+1}??csv`;
  a.click();
  URL.revokeObjectURL(url);
}
